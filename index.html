<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maison Vallon</title>
  <meta name="description" content="Maison Vallon — tienda de ropa francesa." />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#f3f2f2',
            surface: '#eae9e9',
            text: '#201e1d',
            'text-muted': 'rgba(32, 30, 29, 0.6)',
            divider: 'rgba(32, 30, 29, 0.4)',
            accent: {
              100: '#fff2ef',
              200: '#ffe0d9',
              300: '#ffc4b8',
              DEFAULT: '#ec3013',
              600: '#dd2b0f',
              700: '#ae1800',
              800: '#7c1405',
            },
            neutral: {
              100: '#f8f4f4',
              200: '#eae7e7',
              300: '#d7d3d3',
              400: '#bab6b6',
              500: '#9b9797',
              600: '#7d7979',
              700: '#605d5d',
              800: '#444141',
              900: '#2d2b2b',
            },
          },
          fontFamily: {
            heading: ['Archivo', 'system-ui', 'sans-serif'],
            body: ['Archivo', 'system-ui', 'sans-serif'],
          },
          borderRadius: {
            sm: '0px',
            md: '0px',
            lg: '0px',
          },
          boxShadow: {
            sm: '0 1px 2px rgba(45, 43, 43, 0.14)',
            md: '0 3px 10px rgba(45, 43, 43, 0.16)',
            lg: '0 12px 32px rgba(45, 43, 43, 0.22)',
          },
        },
      },
    };
  </script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- NAVBAR START -->
  <header class="relative bg-bg border-b border-divider">
    <input type="checkbox" id="nav-menu-toggle" class="peer hidden" />

    <nav class="mx-auto max-w-7xl h-14 px-4 md:px-6 flex items-center justify-between">
      <!-- Izquierda: hamburguesa (móvil/tablet) + logo -->
      <div class="flex items-center gap-3">
        <label for="nav-menu-toggle" class="lg:hidden flex items-center justify-center w-9 h-9 -ml-2 cursor-pointer text-text" aria-label="Abrir menú">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5M3.75 17.25h16.5" />
          </svg>
        </label>

        <a href="index.html" class="font-heading font-extrabold text-lg tracking-tight text-text">
          MAISON VALLON
        </a>
      </div>

      <!-- Derecha: búsqueda + cuenta + carrito -->
      <div class="flex items-center gap-1 md:gap-3">
        <!-- Búsqueda (desktop) -->
        <div class="hidden md:flex items-center gap-2 bg-surface h-9 w-48 lg:w-64 px-3">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 shrink-0 text-text-muted" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35m1.85-5.4a7.25 7.25 0 11-14.5 0 7.25 7.25 0 0114.5 0z" />
          </svg>
          <input
            type="search"
            placeholder="Buscar productos..."
            class="w-full bg-transparent text-sm text-text placeholder:text-text-muted outline-none"
          />
        </div>

        <!-- Búsqueda (icono, móvil) -->
        <button type="button" class="md:hidden flex items-center justify-center w-9 h-9 text-text" aria-label="Buscar productos">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35m1.85-5.4a7.25 7.25 0 11-14.5 0 7.25 7.25 0 0114.5 0z" />
          </svg>
        </button>

        <!-- Cuenta -->
        <a href="#" class="flex items-center justify-center w-9 h-9 text-text" aria-label="Mi cuenta">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.5 20.25a7.5 7.5 0 0115 0" />
          </svg>
        </a>

        <!-- Carrito -->
        <a href="#" class="relative flex items-center justify-center w-9 h-9 text-text" aria-label="Carrito, 2 artículos">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.836l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 1.907-4.706 2.355-7.185a1.125 1.125 0 00-1.11-1.315H5.106M7.5 14.25L5.106 5.25M7.5 14.25L4.5 4.5m3 9.75h9.75" />
          </svg>
          <span class="absolute -top-1 -right-1 flex items-center justify-center w-4 h-4 rounded-full bg-accent text-bg text-[10px] font-heading font-bold leading-none">
            2
          </span>
        </a>
      </div>
    </nav>

    <!-- Menú lateral / desplegable (móvil) -->
    <div class="hidden peer-checked:block lg:hidden border-t border-divider bg-bg">
      <nav class="flex flex-col px-4 py-3 gap-1">
        <a href="#" class="nav-link py-2" aria-current="page">Inicio</a>
        <a href="#" class="nav-link py-2">Catálogo</a>
        <a href="#" class="nav-link py-2">Camisas</a>
        <a href="#" class="nav-link py-2">Calzado</a>
      </nav>
    </div>
  </header>
  <!-- NAVBAR END -->

</body>
</html>

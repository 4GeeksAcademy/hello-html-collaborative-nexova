<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Maison Vallon</title>

    <!-- Tailwind compilado desde styles.css -->
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-gray-100 text-gray-800">

    <!-- NAVBAR -->
    <nav class="bg-white shadow-md px-6 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-gray-900">FashionFR</h1>
        <ul class="flex gap-6 text-gray-700 font-medium">
            <li><a href="#" class="hover:text-black">Inicio</a></li>
            <li><a href="#" class="hover:text-black">Colecciones</a></li>
            <li><a href="#" class="hover:text-black">Carrito</a></li>
        </ul>
    </nav>

    <!-- CONTENEDOR PRINCIPAL -->
    <main class="max-w-3xl mx-auto mt-10 bg-white p-8 rounded-lg shadow-lg">

        <!-- PROGRESO -->
        <div class="flex justify-between mb-8">
            <div class="text-center">
                <div class="step-circle active">1</div>
                <p class="mt-2 font-medium">Datos personales</p>
            </div>
            <div class="text-center">
                <div class="step-circle">2</div>
                <p class="mt-2 font-medium">Dirección</p>
            </div>
            <div class="text-center">
                <div class="step-circle">3</div>
                <p class="mt-2 font-medium">Pago</p>
            </div>
        </div>

        <!-- FORMULARIO -->
        <form id="checkoutForm">

            <!-- PASO 1 -->
            <section id="step1">
                <h2 class="text-xl font-semibold mb-4">Datos personales</h2>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block mb-1 font-medium">Nombre y apellidos</label>
                        <input type="text" class="input" required>
                    </div>

                    <div>
                        <label class="block mb-1 font-medium">Teléfono</label>
                        <input type="tel" class="input" required>
                    </div>
                </div>

                <div class="mt-4">
                    <label class="block mb-1 font-medium">Correo electrónico</label>
                    <input type="email" class="input" required>
                </div>

                <button type="button" onclick="nextStep(2)" class="btn-primary mt-6 w-full">
                    Continuar a dirección
                </button>
            </section>

            <!-- PASO 2 -->
            <section id="step2" class="hidden">
                <h2 class="text-xl font-semibold mb-4">Dirección de entrega</h2>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block mb-1 font-medium">Nombre de la calle</label>
                        <input type="text" class="input" required>
                    </div>

                    <div>
                        <label class="block mb-1 font-medium">Portal</label>
                        <input type="text" class="input">
                    </div>

                    <div>
                        <label class="block mb-1 font-medium">Escalera</label>
                        <input type="text" class="input">
                    </div>

                    <div>
                        <label class="block mb-1 font-medium">Piso</label>
                        <input type="text" class="input">
                    </div>

                    <div>
                        <label class="block mb-1 font-medium">Puerta</label>
                        <input type="text" class="input">
                    </div>

                    <div>
                        <label class="block mb-1 font-medium">Código postal</label>
                        <input type="text" class="input" required>
                    </div>

                    <div>
                        <label class="block mb-1 font-medium">Localidad</label>
                        <input type="text" class="input" required>
                    </div>

                    <div>
                        <label class="block mb-1 font-medium">Provincia</label>
                        <input type="text" class="input" required>
                    </div>
                </div>

                <div class="flex justify-between mt-6">
                    <button type="button" onclick="nextStep(1)" class="btn-secondary">
                        Volver
                    </button>

                    <button type="button" onclick="nextStep(3)" class="btn-primary">
                        Continuar al pago
                    </button>
                </div>
            </section>

            <!-- PASO 3 -->
            <section id="step3" class="hidden">
                <h2 class="text-xl font-semibold mb-4">Pago con tarjeta</h2>

                <div class="mb-4">
                    <label class="block mb-1 font-medium">Número de tarjeta</label>
                    <input type="text" class="input" required>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block mb-1 font-medium">Fecha de expiración (MM/AA)</label>
                        <input type="text" class="input" required>
                    </div>

                    <div>
                        <label class="block mb-1 font-medium">CVV</label>
                        <input type="text" class="input" required>
                    </div>
                </div>

                <div class="mt-4">
                    <label class="block mb-1 font-medium">Nombre del titular</label>
                    <input type="text" class="input" required>
                </div>

                <div class="flex justify-between mt-6">
                    <button type="button" onclick="nextStep(2)" class="btn-secondary">
                        Volver
                    </button>

                    <button type="submit" class="btn-success">
                        Finalizar compra
                    </button>
                </div>
            </section>

        </form>
    </main>

    <!-- FOOTER -->
    <footer class="bg-white mt-10 py-6 text-center text-gray-600 shadow-inner">
        © 2026 FashionFR — Todos los derechos reservados
    </footer>

    <!-- SCRIPT -->
    <script>
        function nextStep(step) {
            document.getElementById("step1").classList.add("hidden");
            document.getElementById("step2").classList.add("hidden");
            document.getElementById("step3").classList.add("hidden");

            document.getElementById(`step${step}`).classList.remove("hidden");
        }
    </script>

</body>
</html>
